name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: |
          python -m py_compile src/constraint_dynamics_quantum_v3.py tests/test_constraint_dynamics_quantum_v3.py

      - name: Test
        run: |
          python -m pytest -q
